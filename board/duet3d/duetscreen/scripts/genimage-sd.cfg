image sdcard.img {
	hdimage{
		partition-table-type = "mbr"
	}

	partition boot0 {
		in-partition-table = "no"
		image = "boot0_sdcard.fex"
		offset = 8K
	}

	partition boot-packages {
		in-partition-table = "no"
		image = "boot_package.fex"
		offset = 16400K
	}

	partition boot {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
	}

	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext4"
	}
}

image boot.vfat {
	vfat {
		label = "boot"
		files = {
			"sun8i-duet3d-duetscreen-linux.dtb",
			"uEnv.txt",
			"uEnv-debug.txt",
			"uImage"
		}
	}
	size = 32M
}
